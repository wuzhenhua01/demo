name: superpowers-bridge
version: 1
description: >
  与 Superpowers 技能整合的 spec-driven 工作流。
  前置条件：已安装 Superpowers 插件，提供以下技能：
  brainstorming、writing-plans、using-git-worktrees、
  subagent-driven-development、finishing-a-development-branch。
  需要支持 subagent 的平台（Claude Code、Codex 等）——
  本 schema 不支持没有 subagent 能力的运行时，
  因为替代执行器（executing-plans）会丢失 TDD 和
  code-review 的传递激活，抵消了 Superpowers 的核心价值。
  若你的平台不支持 subagent，请改用 spec-driven。
  每个 artifact / apply 步骤在调用前会验证所需技能，
  缺失时抛出明确错误。
  brainstorm → proposal → specs → tasks → plan → verify → retrospective。
  design 为必填（将原始 brainstorm 产出重组为结构化的
  Context / Goals / Decisions / Risks / Migration；供 tasks
  和 plan 参考以指导实作）。
  Apply 阶段使用 git worktrees + subagent-driven-development
  （传递带来 TDD 和 code-review）。

artifacts:
  - id: brainstorm
    generates: brainstorm.md
    description: 使用 Superpowers brainstorming 进行协作式设计探索
    template: brainstorm.md
    instruction: |
      PRECHECK — 验证所需技能可用性：
      调用前，确认 `superpowers:brainstorming` 出现在可用技能列表中。
      若缺失，STOP 并告知使用者必须安装 Superpowers 插件（或让使用者
      明确选择使用下方模板手动撰写 brainstorm.md）。不要静默降级。

      使用 Skill 工具调用 **superpowers:brainstorming**。

      重要输出重导：
      - 不要写入 `docs/superpowers/specs/`。将 brainstorming 产出
        直接写入此 change 的 `brainstorm.md`。
      - brainstorm.md 是原始捕获——将 brainstorming 技能的完整产出
        原样写入，不要强制套用任何模板结构。技能的自然产出通常是
        决策日志（背景 → 决策链 Q1-Qn → 设计权衡），但格式因对话
        而异。保留技能的自然组织方式。
      - 不要在此步骤预填 design.md。design.md 是独立的 artifact，
        将 brainstorm.md 内容重组为结构化段落（Context、Goals、
        Decisions、Risks、Migration）。该转换发生在 design 步骤。

      brainstorming 技能将会：
      1. 探索专案上下文
      2. 提出澄清问题（一次一个）
      3. 提出 2-3 个方案及权衡
      4. 呈现设计段落供确认
      5. 输出经过验证的设计
    requires: []

  - id: proposal
    generates: proposal.md
    description: 概述变更的初始提案文档
    template: proposal.md
    instruction: |
      基于 brainstorming 产出创建提案文档。

      读取 brainstorm.md 获取经过验证的设计。提取：
      - **Why**：动机（来自 brainstorming 讨论）
      - **What Changes**：达成共识的具体变更
      - **Capabilities**：识别将创建或修改哪些 spec：
        - **New Capabilities**：列出引入的能力。每项将成为新的 `specs/<name>/spec.md`。使用 kebab-case 命名。
        - **Modified Capabilities**：列出 REQUIREMENTS 正在变更的现有能力。检查 `openspec/specs/` 中的现有 spec 名称。
      - **Impact**：受影响的程式码、API、依赖或系统。

      由于 brainstorming 已经探索了问题空间，
      此处应为简洁的提取，而非新的探索。

      重要：Capabilities 段落至关重要。它在 proposal 与 specs 阶段之间
      建立契约。此处列出的每个能力都需要一个 spec 文件。

      保持简洁（1-2 页）。聚焦于「为什么」而非「怎么做」。
    requires:
      - brainstorm

  - id: design
    generates: design.md
    description: 包含实作细节的技术设计文档
    template: design.md
    instruction: |
      创建设计文档，说明如何实作此变更。

      读取 brainstorm.md 作为输入。brainstorm.md 是 brainstorming 技能
      产出的原始捕获（通常是包含 Q1-Qn 决策、权衡和上下文的决策日志）。
      你的工作是将该内容重组为下方结构化段落。

      这是转换，不是复制。提取并重构：
      - Decisions（brainstorm 中的 Q1-Qn）→ design.md §Decisions
      - Background/context → design.md §Context
      - Trade-offs → design.md §Risks / Trade-offs
      - 补充 Goals/Non-Goals 和 Migration Plan（可能需要
        从 brainstorm.md 内容推断）

      段落：
      - **Context**：背景、现状、约束、利益相关者
      - **Goals / Non-Goals**：此设计达成的目标及明确排除的项目
      - **Decisions**：关键技术选择及理由（为什么选 X 而非 Y？）。包含每项决策考虑过的替代方案。
      - **Risks / Trade-offs**：已知限制、可能出错的事项。格式：[风险] → 缓解措施
      - **Migration Plan**：部署步骤、回滚策略（如适用）
      - **Open Questions**：待解决的决策或未知项

      聚焦于架构和方法，而非逐行实作。
      好的设计文档解释技术决策背后的「为什么」。
    requires:
      - brainstorm

  - id: specs
    generates: "specs/**/*.md"
    description: 变更的详细规格说明
    template: spec.md
    instruction: |
      创建规格文件，定义系统应该做什么。

      为提案 Capabilities 段落中列出的每个能力创建一个 spec 文件。
      - 新能力：使用提案中的 kebab-case 名称（specs/<capability>/spec.md）。
      - 修改的能力：使用 openspec/specs/<capability>/ 中的现有 spec 目录名，
        在 specs/<capability>/spec.md 创建 delta spec。

      Delta 操作（使用 ## 标题）：
      - **ADDED Requirements**：新能力
      - **MODIFIED Requirements**：变更的行为——必须包含完整的更新内容
      - **REMOVED Requirements**：废弃的功能——必须包含 **Reason** 和 **Migration**
      - **RENAMED Requirements**：仅名称变更——使用 FROM:/TO: 格式

      格式要求：
      - 每个需求：`### Requirement: <name>` 后跟描述
      - 使用 SHALL/MUST 表述规范性需求（避免 should/may）
      - 每个场景：`#### Scenario: <name>` 使用 WHEN/THEN 格式
      - **关键**：场景必须使用恰好 4 个井号（`####`）。使用 3 个井号或列表项会静默失败。
      - 每个需求必须至少有一个场景。

      Spec 应可测试——每个场景都是潜在的测试用例。
    requires:
      - proposal

  - id: tasks
    generates: tasks.md
    description: 带有可追踪任务的实作清单
    template: tasks.md
    instruction: |
      创建将实作工作分解的任务清单。

      **重要：严格遵循下方模板。** apply 阶段解析
      checkbox 格式来追踪进度。不使用 `- [ ]` 的任务不会被追踪。

      指引：
      - 将相关任务归组在 ## 编号标题下
      - 每个任务必须是 checkbox：`- [ ] X.Y 任务描述`
      - 任务应足够小，能在一个工作阶段内完成
      - 按依赖排序（什么必须先做？）

      参考 specs 了解需要构建什么，参考 design.md 了解
      如何构建（架构决策、权衡、迁移）。
    requires:
      - specs
      - design

  - id: plan
    generates: plan.md
    description: 使用 Superpowers writing-plans 的微任务实作计划
    template: plan.md
    instruction: |
      PRECHECK — 验证所需技能可用性：
      调用前，确认 `superpowers:writing-plans` 出现在可用技能列表中。
      若缺失，STOP 并告知使用者必须安装 Superpowers 插件（或让使用者
      明确选择使用下方模板手动撰写 plan.md）。不要静默降级。

      使用 Skill 工具调用 **superpowers:writing-plans**。

      重要输出重导：
      - 不要写入 `docs/superpowers/plans/`。将计划直接
        写入此 change 的 `plan.md`。

      writing-plans 技能将会：
      1. 读取 tasks.md 和 design.md 获取上下文
      2. 将每个任务分解为 2-5 分钟的微步骤（TDD 风格）
      3. 包含确切的文件路径、程式码片段、测试命令
      4. 在每个任务后添加提交点

      将 tasks.md 内容作为分解输入传给技能。
      计划应引用此 change 目录中的 specs 和 design artifact。
    requires:
      - tasks

  - id: verify
    generates: verify.md
    description: 实作后针对 specs、design 和 tasks 的验证
    template: verify.md
    instruction: |
      PRECHECK — 实作证据：
      产出 verify.md 前，运行以下两条命令。若任一
      返回 0，STOP 并告知使用者 apply 阶段尚未产出
      可审查的变更。

      1. 提交证据（必须返回 > 0）：
         git log --oneline $(git merge-base HEAD origin/main 2>/dev/null || git merge-base HEAD origin/master 2>/dev/null)..HEAD | wc -l

      2. 任务进度（必须返回 > 0）：
         grep -c '^- \[x\]' openspec/changes/<change-name>/tasks.md

      仅在两者都返回正数后，才继续调用下方验证技能。

      使用 Skill 工具调用 **openspec-verify-change**（
      `/opsx:verify` 斜线命令是其使用者端等价物）。

      重要时序说明：
      - 与其他 artifact 不同，verify.md 在 apply 阶段完成后
        产出，而非在规划期间。`requires: [plan]` 边仅用于
        schema graph 目的——实际验证步骤必须在已完成的
        实作上运行。

      验证步骤必须执行以下检查，并使用模板将结果
      记录在 verify.md 中：

      1. **结构验证**：在仓库根目录运行
         `openspec validate --all --json`，确认每项返回
         `"valid": true`。若有项目失败，记录问题并在
         继续前回去修复底层 artifact。

      2. **任务完成度**：确认 tasks.md 中每个 checkbox 为
         `- [x]`。对于剩余的 `- [ ]`，记录原因
         （如手动 / 超出范围 / 受阻）及是否阻碍归档。

      3. **Delta spec 同步状态**：对 `openspec/changes/<name>/specs/`
         下的每个目录，与对应的 `openspec/specs/<capability>/spec.md`
         比较，记录以下之一：
         - ✓ 已同步
         - ✗ 需同步（列出能力）
         - N/A（未产出 delta spec）

      4. **Design/specs 一致性**：抽检 design.md 的决策是否
         引用或对齐 specs/ 中列出的需求。将任何偏差
         记录为警告（不阻碍）。

      5. **实作信号**：确认所有程式码变更已提交
         （worktree 中无未暂存文件）。如已知则引用提交范围。

      6. **Front-door routing 泄漏检测器**（警告，不阻碍）：

         使用 superpowers-bridge 的专案，设计产出不应
         出现在 `docs/superpowers/specs/`——brainstorm artifact
         的输出重导（见本 schema 的 brainstorm.instruction）
         将其路由到 `openspec/changes/<name>/brainstorm.md`。运行：

           ls docs/superpowers/specs/*.md 2>/dev/null

         若有文件存在，记录警告："Front-door routing 泄漏——
         在 docs/superpowers/specs/... 发现设计产出；这些应属于
         openspec/changes/<name>/brainstorm.md 或 design.md。
         确认内容已捕获到 change 目录后再移动/删除。"

         不阻碍——采用者可能在安装 schema 前已有该目录的
         合法用途。暴露泄漏让使用者决定是否清理。

      7. **延迟 dogfood 与自动化测试等价性**：

         若 plan.md 有标记为 `[~]` 延迟的任务（手动冒烟测试 /
         dogfood / 线上环境检查未在本周期运行），在 verify.md
         §7 中逐项列举，并识别覆盖相同断言的等价自动化测试。

         若延迟的手动检查没有等价自动化测试，该行是真正的
         覆盖缺口——在 retrospective Misses 中记录并附后续计划，
         而非静默延迟。

         决策表使"已延迟但有覆盖"与"已延迟且有缺口"在归档时
         可见，审查者无需从 plan + 测试文件重新推导理由即可
         审计完整性。

         单独不阻碍——Overall Decision 即使有已识别的缺口仍
         为 PASS，前提是它们被记录为后续项。仅在 §7 为空
         且 plan.md 有 `[~]` 行时才阻碍（表示缺口分析被跳过，
         而非缺口不存在）。

      验证可多次重跑——每次运行以当前状态覆盖 verify.md。

      若 `openspec-verify-change` 技能不可用，回退为手动
      运行上述编号检查并在 verify.md 中记录结果。
    requires:
      - plan

  - id: retrospective
    generates: retrospective.md
    description: 已完成变更的 evidence-first 回顾
    template: retrospective.md
    instruction: |
      PRECHECK — 验证完成证据：
      产出 retrospective.md 前，运行以下命令。若任一
      失败，STOP 并告知使用者 verify 必须先通过。

      1. verify.md 存在：
         test -f openspec/changes/<change-name>/verify.md

      2. verify.md 的 Overall Decision 未标记为 FAIL。
         verify.md 模板在 "Overall Decision" 段有 3 个互斥
         checkbox："✅ PASS"、"⚠️ PASS WITH WARNINGS"、
         "❌ FAIL"。仅 "❌ FAIL" 被勾选时为阻碍：
         ! grep -q '^- \[x\] ❌ FAIL' openspec/changes/<change-name>/verify.md

      仅在两者都成功后，才继续。

      撰写此变更的 evidence-first 回顾。

      重要时序说明：
      - retrospective.md 在 apply 阶段完成且 verify.md
        无阻碍问题后产出。`requires: [verify]` 边仅用于
        schema graph 目的；实际回顾必须在已完成、已验证的
        实作上运行。

      流程（遵循以下 3 步）：

      1. **收集证据**
         - 在 change worktree（或 worktree 已合并时的
           main checkout）中运行 `git log --oneline <base>..HEAD`
           获取提交范围
         - 读取此 change 目录中的 brainstorm.md、plan.md、
           tasks.md 进行计划与实际对比
         - 若 verify.md 包含失败项，在写回顾前先处理

      2. **撰写回顾段落**——每个论点引用提交哈希、
         文件路径、测试名称或可量化事实。

         回顾包含 §0 Evidence（量化前置数据）加上
         6 个分析段落（§1–§6）。下游分析条目引用 §0，
         而非每行内联 `[evidence: commit X]`。

         §0) **Evidence**——从 `git log <base>..HEAD`、
             `tasks.md` 和 verify.md 填充的量化前置数据：
             提交数、diff 大小（行/文件）、任务完成比、
             活跃时数、subagent 派发数、新增外部依赖、
             合并后 bug、归档时 OpenSpec validate 状态、
             测试覆盖信号、一行提交链。

         §1) **Wins**——什么做得好，附证据

         §2) **Misses**——什么没做好，按严重度标记：
             - 🔴 阻碍
             - 🟡 痛点
             - 📌 小事

         §3) **Plan deviations**——范围发生变化的任务及原因

         §4) **Skill / workflow 合规性**——列出本 schema
             apply 阶段的每个技能；标记是否实际使用。
             对于任何 ✗，按下方规则填写
             `### Deliberately Skipped Skills` 子段落。

         §5) **Surprises**——被证伪的假设

         §6) **Promote candidates → 长期学习**——使用
             `- [ ]` 清单（非平面表格）。每个候选项：

             - 标题带严重度 emoji（🔴/🟡/📌）+ 一句学习
             - `→ **Promote to** <目的地>`（memory /
               CLAUDE.md / schema / skill / one-off）
             - 两行正文对齐反馈记忆 schema：
               `> **Why**: <原因>` 和
               `> **How to apply**: <触发条件>`

             未勾选的 `- [ ]` 项目代表进行中的候选项，
             延续到下一周期的回顾重新评估。清单 + Why/How
             正文结构使候选项可机械地转移到
             `~/.claude/memory/` 而无需重写。

         **§4 跳过技能规则**：

         本 schema 的设计意图是 apply 阶段不应跳过任何
         技能——每个技能在流程中都有其理由。预设期望：
         §4 每行都标记 ✓。

         对于任何标记 ✗ 的技能，不要只写一行原因。
         `### Deliberately Skipped Skills` 子段落必须
         为每个跳过的技能回答三个问题：

         - **跳过了什么**：具体的技能或子步骤
         - **为什么本周期**：触发跳过的具体周期条件。
           模糊理由（"不需要"、"太小"、"没时间"、
           "被外部依赖阻塞"、"输出看起来不对"）不够——
           必须指出实际触发因素（具体的提交哈希、日志行、
           或观察到的行为）。
         - **如何防止再发生**：下一周期在相同情况下应
           依赖什么替代——schema graph 修复 / 技能描述
           收紧 / CLAUDE.md 触发器 / 范围判断规则 /
           明确标注"一次性——schema 边界情况"（最后者
           必须说明为什么是边界，而非仅标注例外）。

         若多个周期以相似的"如何防止"答案跳过同一技能，
         该模式是 §6 Promote 候选项（schema / skill PR
         动机）。§4 子段落是 schema 维护的反馈循环——
         它应让下次回顾的子段落更短，而非更长。

      3. **回顾跳过策略**（不同于 §4 技能跳过——这是
         是否要写回顾）：

         - 微不足道的单提交修复：可以完全跳过回顾。
           在 retrospective.md 中写一行原因（如"已跳过：
           单提交 linter 修复，无洞察"）。
         - 其他情况：产出 §0 Evidence 加上全部 6 个分析
           段落（若某段确实无内容，占位"(none observed)"
           即可）。

      4. **前向指针策略（当撰写后事实发生变化时）**

         Retrospective.md 反映撰写时的状态。若后续周期
         发现本回顾中的论点、证据或结论有误/不完整：

         - 不要改写回顾（会丢失当时所知的审计轨迹）
         - 在回顾中添加前向指针：
           `> **Update YYYY-MM-DD**: section X 被
           <后续回顾 / 提交 / issue 链接> 取代`
         - 后续 artifact 承载修正后的分析

         原因：回顾是基于证据的——其价值在于捕获特定
         时间点已知和推理的内容。改写会移除审计轨迹。

      使用模板结构将输出写入 retrospective.md。
    requires:
      - verify

apply:
  requires: [plan]
  tracks: tasks.md
  instruction: |
    实作前，先建立隔离工作区和执行器：

    0. **Pre-flight — 验证所需的 Superpowers 技能**：

       本 schema 的 apply 阶段需要以下技能。
       在继续前确认每项都出现在可用技能列表中：

       - superpowers:using-git-worktrees
       - superpowers:subagent-driven-development
        （传递依赖：superpowers:test-driven-development、
                      superpowers:requesting-code-review）
       - superpowers:finishing-a-development-branch

       若任何所需技能缺失，STOP 并告知使用者——
       不要继续，也不要静默降级为手动实作。使用者可以
       安装 Superpowers 插件，或明确选择本指令末尾描述的
       手动降级路径。

       此外，确认专案预期的 CLI 工具在 PATH 上。确切列表
       取决于专案——读取 plan.md 并暴露任何提到的工具
       （如 `mvn`/`mvnw`、`docker`、`python3`、`jq`、
       `glab`/`gh`、`node`/`npm`）。若工具缺失，
       作为 WARNING（而非 STOP）暴露——使用者可能有替代
       方案。在 apply 开始时打印缺失列表一次，避免使用者在
       周期中途才感到意外。

    1. **Workspace**：使用 Skill 工具调用
       **superpowers:using-git-worktrees** 为此 change
       创建隔离的 git worktree。

    2. **Executor — subagent-driven-development**：

       使用 Skill 工具调用
       **superpowers:subagent-driven-development** 以
       用每个任务全新的 subagent 执行 plan.md 微任务。

       告诉执行器：
       - 读取此 change 目录中的 plan.md 获取微任务
       - 粗粒度任务完成时更新 tasks.md checkbox
       - 在已创建的 worktree 中工作

       重要——传递技能激活：
       subagent-driven-development 内部强制执行以下技能，
       因此你不需要手动调用：
       - **superpowers:test-driven-development**——每个任务
         遵循 RED-GREEN-REFACTOR。在失败测试之前写的
         实作程式码会被删除。
       - **superpowers:requesting-code-review**——每个任务
         后，派发 code-reviewer subagent 捕获 spec 合规性
         和程式码品质问题。apply 结束前对整个实作运行
         最终审查。

       本 schema 不支持 `superpowers:executing-plans` 作为
       无 subagent 平台的降级方案。根据其 SKILL.md，
       executing-plans 不会传递激活 TDD 或 code-review——
       抵消了 Superpowers 带来的严谨性。若你的平台不支持
       subagent，请改用内建的 `spec-driven` schema。

    3. **Verification**：所有任务完成后，通过调用
       **openspec-verify-change** 产出 `verify` artifact，
       检查完整性、正确性和一致性。重跑 verify 直到所有
       阻碍问题解决。

    4. **Retrospective（趁上下文还热时撰写）**：

       verify.md 无阻碍问题后，在开任何 PR 之前产出
       `retrospective` artifact。运行 retrospective artifact
       的 instruction（它有自己的 PRECHECK 确认 verify.md
       存在且非 FAIL）。

       为什么是现在而非 PR 后：retrospective 是本周期
       交付物的一部分，应落在同一个 PR。在 PR 合并后
       写会产生单独的尾随提交，且丢失热上下文
       （运行中的测试、新鲜的修复记忆）。

    5. **Archive（同步 spec delta + 搬移目录）**：

       retrospective.md 写完后，运行 `openspec archive -y`
       （或调用 `/opsx:archive`）。这会：
       - 将 delta spec 从 `openspec/changes/<name>/specs/`
         同步到 `openspec/specs/<capability>/spec.md`
       - 将 change 目录搬移到
         `openspec/changes/archive/YYYY-MM-DD-<name>/`

       归档后的 PR diff 包含完整的周期状态：
       全部 8 个 artifact 完成、spec 已同步到主 specs、
       change 在 archive/ 下。

    6. **Completion（PR 是最后一步）**：

       retrospective + archive 都完成后，使用 Skill 工具
       调用 **superpowers:finishing-a-development-branch**。

       分支的 PR diff 必须包含完整的已归档周期。若没有
       （例如因为 retrospective 或 archive 被跳过），
       STOP 并先完成那些步骤。

       这是 PR 的规范开启顺序——不要重新排序。
